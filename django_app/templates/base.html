{% load static %}
<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8">
        <title>
            {% block title %}
            {% endblock %}
        </title>
        <link rel="stylesheet" href="{% static 'css/style.css' %}">
        <link rel="shortcut icon" type="image/png" href="{% static 'default/dealer.png' %}">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body class="bg-light">
        <header class="bg-dark text-white p-3 mb-4">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <a href="{% url 'main:home' %}" class="text-white text-decoration-none h4 mb-0">Frame Pit</a>

                    <div>
                        {% if user.is_authenticated %}
                            <a href="{% url 'users:profile_detail' user.id %}" class="btn btn-outline-light btn-sm">Профиль</a>
                            <form action="{% url 'users:logout' %}" method="post" class="d-inline">
                                {% csrf_token %}
                                <button type="submit" class="btn btn-outline-light btn-sm">
                                    Выйти
                                </button>
                            </form>
                        {% else %}
                            <a href="{% url 'users:login' %}" class="btn btn-outline-light btn-sm me-2">Вход</a>
                            <a href="{% url 'users:register' %}" class="btn btn-light btn-sm">Регистрация</a>
                        {% endif %}
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            {% block content %}
            {% endblock %}
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
