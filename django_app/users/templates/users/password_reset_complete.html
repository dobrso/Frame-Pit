{% extends 'base.html' %}

{% block title %}
    Пароль изменен — Frame Pit
{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <div class="login-header">
            <h3>ПАРОЛЬ ИЗМЕНЕН</h3>
        </div>

        <div class="login-body">
            <div class="reset-info">
                <div class="reset-icon success">✅</div>
                <h4>ГОТОВО!</h4>

                <div class="success-message complete">
                    <p>
                        Ваш пароль успешно изменен.<br>
                        Теперь вы можете войти в аккаунт с новым паролем.
                    </p>
                </div>

                <div class="complete-animation">
                    <div class="bullet-chamber">
                        <div class="bullet"></div>
                        <div class="bullet"></div>
                        <div class="bullet"></div>
                        <div class="bullet"></div>
                        <div class="bullet"></div>
                        <div class="bullet"></div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="back-to-login">
                    <a href="{% url 'users:login' %}" class="btn-solid-roulette">
                        ВОЙТИ В АККАУНТ
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
