{% extends 'base.html' %}

{% block title %}
    Письмо отправлено
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm border-success">
                <div class="card-header bg-success text-white text-center">
                    <h3 class="mb-0">Письмо отправлено</h3>
                </div>
                <div class="card-body text-center">
                    <h4 class="mb-3">Проверьте вашу почту</h4>

                    <p class="text-muted mb-4">
                        На вашу почту было отправлено письмо со ссылкой для восстановления пароля.<br>
                        <strong>Проверьте почту (и папку "Спам")</strong>
                    </p>

                    <hr>

                    <div class="mt-3">
                        <a href="{% url 'users:login' %}" class="btn btn-primary">
                            Вернуться ко входу
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
