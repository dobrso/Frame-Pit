{% extends 'base.html' %}

{% block title %}
    Удаление профиля
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-danger">
                <div class="card-header bg-danger text-white text-center">
                    <h3 class="mb-0">Удаление профиля</h3>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mx-auto text-danger">
                            <path d="M12 8V12M12 16H12.01M3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </div>
                    <h4 class="mb-3">Вы уверены?</h4>
                    <p class="text-muted mb-4">
                        Вы собираетесь удалить свой профиль. Это действие <strong>нельзя будет отменить</strong>.
                        Все ваши данные будут потеряны навсегда.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="{% url 'users:profile_detail' user.id %}" class="btn btn-secondary px-4">
                                Отмена
                            </a>
                            <button type="submit" class="btn btn-danger px-4">
                                Да, уверен
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
