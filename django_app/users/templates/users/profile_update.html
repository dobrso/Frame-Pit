{% extends 'base.html' %}

{% block title %}
    Редактирование профиля {{ profile.user.username }}
{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="mb-0">Редактирование профиля</h3>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}

                        <div class="mb-3 text-center">
                            {% if profile.image %}
                                <img src="{{ profile.image.url }}" alt="Фото профиля"
                                     class="img-thumbnail rounded-circle mb-2"
                                     width="120" height="120" style="object-fit: cover;">
                            {% endif %}
                            <label class="form-label d-block">Фото профиля</label>
                            {{ form.image }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Описание</label>
                            {{ form.description }}
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'users:profile_detail' user.id %}" class="btn btn-secondary">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
